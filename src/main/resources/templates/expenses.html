<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Expenses</title>

    <link href=
                  "https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div class="card shadow p-4">

        <h3 class="mb-4">Add Expense</h3>

        <form id="expenseForm">
            <input type="hidden" id="expenseId">

            <div class="row">

                <div class="col-md-3">
                    <input type="text"
                           class="form-control"
                           id="description"
                           placeholder="Description"
                           required>
                </div>

                <div class="col-md-2">
                    <input type="number"
                           step="0.01"
                           class="form-control"
                           id="amount"
                           placeholder="Amount"
                           required>
                </div>

                <div class="col-md-2">
                    <input type="date"
                           class="form-control"
                           id="date"
                           required>
                </div>

                <div class="col-md-3">
                    <select id="categoryId"
                            class="form-select"
                            required>

                        <option value="">
                            Select Category
                        </option>

                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}">
                        </option>

                    </select>
                </div>

                <div class="col-md-2">
                    <button
                            id="saveBtn"
                            class="btn btn-primary w-100">

                        Save

                    </button>
                </div>

            </div>

        </form>

    </div>

    <div class="card shadow p-4 mb-4">

        <h3>Find Expense By ID</h3>

        <div class="row">

            <div class="col-md-4">

                <input type="number"
                       id="searchExpenseId"
                       class="form-control"
                       placeholder="Enter Expense ID">

            </div>

            <div class="col-md-2">

                <button class="btn btn-info w-100"
                        onclick="findExpenseById()">

                    Search

                </button>

            </div>

        </div>

        <div id="expenseSearchResult"
             class="mt-3"></div>

    </div>

    <div class="card mt-4 shadow p-4">

        <h3>Expenses</h3>

        <table class="table table-bordered table-striped mt-3">

            <thead class="table-dark">

            <tr>
                <th>Description</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Category</th>
                <th>Action</th>
            </tr>

            </thead>

            <tbody id="expenseTable">

            <tr th:each="expense : ${expenses}">

                <td th:text="${expense.description}"></td>

                <td th:text="${expense.amount}"></td>

                <td th:text="${expense.date}"></td>

                <td th:text="${expense.categoryName}"></td>

                <td>

                    <button
                            class="btn btn-warning btn-sm"

                            th:attr="onclick=|editExpense(
                    ${expense.id},
                    '${expense.description}',
                    ${expense.amount},
                    '${expense.date}',
                    ${expense.categoryId}
                )|">

                        Edit

                    </button>

                    <button
                            class="btn btn-danger btn-sm"

                            th:attr="onclick=|deleteExpense(${expense.id})|">

                        Delete

                    </button>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

<script src="/js/app.js"></script>

</body>
</html>
